  <meta charset="UTF-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
    #map { width: 100%; height: 100vh; }
    .map-title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      padding: 10px 18px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-weight: bold;
      font-size: 18px;
      text-align: center;
    }
    .north-arrow {
      position: absolute;
      top: 10px;
      right: 15px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }
    .legend {
      position: absolute;
      bottom: 30px;
      right: 15px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      line-height: 1.6;
      font-size: 14px;
    }
    .legend i {
      width: 14px;
      height: 14px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
      padding-top:6px
    }
    .coords {
      position: absolute;
      bottom: 10px;
      left: 100px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    img {
      width: 100px;
      height: 90px;
    }

  </style>
</head>

  <div class="north-arrow">N<br>⬆</div>

    <i style="background:#e31a1c"></i> South East<br>
    <i style="background:#dd0add"></i> South West<br>

    );


    const map = L.map('map',
      {
        maxBounds: nigBounds,      // Restricts panning to this area
        maxBoundsViscosity: 1.0,  // Makes the bounds feel "solid" (no bouncing back)
        
      }
    ).setView([9.38, 7.17], 6);

    const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 18,
        minZoom: 6,
        className: 'map-tiles'
    }).addTo(map);

    const baseMaps = {
      'OpenStreetMap': carto,
      // 'Satellite': satellite
    };

    // L.control.layers(baseMaps).addTo(map);
    L.control.scale().addTo(map);

    map.on('mousemove', function(e) {
      document.getElementById('coords').innerHTML =
        `Lat: ${e.latlng.lat.toFixed(5)}, Lng: ${e.latlng.lng.toFixed(5)}`;
    });

    const polygonStyle = {

    // Hover style for better interaction

        color: "#ff2200",

    // Add GeoJSON layer to map
    customPolygonLayer = L.geoJSON(NEZ, {

            const props = feature.properties;
            const popupContent = `
                <div style="min-width: 200px;">
                    <p style="margin-bottom: 4px; font-size: 0.85rem;">${props.name} state</p>
                    <hr style="margin: 5px 0;">
                    <div><strong>Governor:</strong> ${props.SYE_name || "Unknown"}</div>
                    <div><strong>Gender:</strong> ${props.SYE_gender || "Unknown"}</div>

                    <div><strong>Area (Ha):</strong> ${props.area || "Unknown"}</div>
                    <div><img src='${props.SYE_gov_pic}' /></div>
                </div>
            `;
            layer.bindPopup(popupContent);
            
            // Highlight on hover
            layer.on('mouseover', function(e) {
                this.setStyle(hoverStyle);
                // Optionally open a tooltip
                if (!this.getPopup().isOpen()) {
                    this.openTooltip();
                }
            });
            layer.on('mouseout', function(e) {
                this.setStyle(polygonStyle);
                this.closeTooltip();
            });
            
            // Add tooltip with basic info

            // Log click for debugging

                console.log("Polygon clicked:", props);

                const detailsDiv = document.getElementById('polygonDetails');
